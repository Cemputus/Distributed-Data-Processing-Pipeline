# DSC3219 — Postgres, MinIO, Airflow (custom image with spark-submit), Spark Standalone (master + worker).
# Airflow UI: http://localhost:8080  (airflow / airflow)
# Spark master UI: http://localhost:8085
# MinIO console: http://localhost:9001

x-airflow-common: &airflow-common
  build:
    context: ./infra/docker/airflow
    dockerfile: Dockerfile
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY:-replace_with_secure_fernet_key}
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    # REST API must accept Basic Auth; otherwise POST /api/v1/... returns HTML CSRF errors.
    AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session
    _PIP_ADDITIONAL_REQUIREMENTS: ""
  user: "${AIRFLOW_UID:-50000}:0"
  volumes:
    - ./infra/airflow/dags:/opt/airflow/dags
    - ./infra/airflow/logs:/opt/airflow/logs
    - ./infra/airflow/plugins:/opt/airflow/plugins
    - ./infra/spark/jobs:/opt/spark-jobs:ro
    - ./data/fintech:/opt/data/fintech:ro

services:
  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    volumes:
      - ./data/fintech:/data
      - ./secrets:/secrets:ro
    environment:
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET_LANDING: fintech-landing
      MINIO_USE_SSL: "false"
      AIRFLOW_BASE_URL: http://airflow-webserver:8080
      AIRFLOW_USERNAME: airflow
      AIRFLOW_PASSWORD: airflow
      AIRFLOW_ETL_DAG_ID: distributed_pipeline_scaffold
      AIRFLOW_UI_PUBLIC: http://localhost:8080
      # Browser URL for MinIO Console (host port 9001). Override if you access Docker from another machine.
      MINIO_CONSOLE_PUBLIC: ${MINIO_CONSOLE_PUBLIC:-http://localhost:9001}
      # Mount ./secrets on host to /secrets in container; place your service account JSON there (see .env.example).
      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS:-}
      BIGQUERY_CREDENTIALS_PATH: ${BIGQUERY_CREDENTIALS_PATH:-/secrets/cloud-project-493415-1be4ba53f9c5.json}
      BIGQUERY_PROJECT_ID: ${BIGQUERY_PROJECT_ID:-cloud-project-493415}
      BIGQUERY_ENABLED: ${BIGQUERY_ENABLED:-true}
      BIGQUERY_DEFAULT_DATASET: ${BIGQUERY_DEFAULT_DATASET:-cen_analytics}
      BIGQUERY_DATASET_LOCATION: ${BIGQUERY_DATASET_LOCATION:-US}
      # Create this dataset once in BigQuery console; uploads sync here when enabled
      BIGQUERY_INGEST_DATASET: ${BIGQUERY_INGEST_DATASET:-cen_analytics}
      BIGQUERY_AUTO_LOAD_ON_UPLOAD: ${BIGQUERY_AUTO_LOAD_ON_UPLOAD:-false}
      SPARK_MASTER_UI_INTERNAL_URL: http://spark-master:8085
      SPARK_MASTER_UI_PUBLIC: ${SPARK_MASTER_UI_PUBLIC:-http://localhost:8085}
    depends_on:
      minio:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/health', timeout=5)\""]
      interval: 20s
      timeout: 10s
      retries: 5

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:5000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:5173', (res) => process.exit(res.statusCode >= 200 && res.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1));\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/zz-analytics.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 5s
      retries: 10
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  hadoop-namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    environment:
      - CLUSTER_NAME=fintech-hadoop
    ports:
      - "9870:9870"
      - "9005:9000"
    volumes:
      - hadoop-namenode:/hadoop/dfs/name
    restart: unless-stopped
    profiles: ["hadoop"]

  hadoop-datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    environment:
      - CORE_CONF_fs_defaultFS=hdfs://hadoop-namenode:9000
      - SERVICE_PRECONDITION=hadoop-namenode:9870
    depends_on:
      - hadoop-namenode
    volumes:
      - hadoop-datanode:/hadoop/dfs/data
    restart: unless-stopped
    profiles: ["hadoop"]

  hadoop-resourcemanager:
    image: bde2020/hadoop-resourcemanager:2.0.0-hadoop3.2.1-java8
    environment:
      - CORE_CONF_fs_defaultFS=hdfs://hadoop-namenode:9000
      - YARN_CONF_yarn_resourcemanager_hostname=hadoop-resourcemanager
      - SERVICE_PRECONDITION=hadoop-namenode:9870 hadoop-datanode:9864
    depends_on:
      - hadoop-namenode
      - hadoop-datanode
    ports:
      - "8088:8088"
    restart: unless-stopped
    profiles: ["hadoop"]

  hadoop-nodemanager:
    image: bde2020/hadoop-nodemanager:2.0.0-hadoop3.2.1-java8
    environment:
      - CORE_CONF_fs_defaultFS=hdfs://hadoop-namenode:9000
      - YARN_CONF_yarn_resourcemanager_hostname=hadoop-resourcemanager
      - SERVICE_PRECONDITION=hadoop-resourcemanager:8088
    depends_on:
      - hadoop-resourcemanager
    restart: unless-stopped
    profiles: ["hadoop"]

  hadoop-historyserver:
    image: bde2020/hadoop-historyserver:2.0.0-hadoop3.2.1-java8
    environment:
      - CORE_CONF_fs_defaultFS=hdfs://hadoop-namenode:9000
      - YARN_CONF_yarn_resourcemanager_hostname=hadoop-resourcemanager
      - SERVICE_PRECONDITION=hadoop-resourcemanager:8088 hadoop-namenode:9870
    depends_on:
      - hadoop-resourcemanager
      - hadoop-namenode
    ports:
      - "8188:8188"
    restart: unless-stopped
    profiles: ["hadoop"]

  spark-master:
    image: docker.io/bitnamilegacy/spark:3.5.1
    environment:
      SPARK_MODE: master
      # Stable hostname for worker registration inside the Docker network.
      SPARK_MASTER_HOST: spark-master
      SPARK_MASTER_WEBUI_PORT: "8085"
      SPARK_RPC_AUTHENTICATION_ENABLED: "no"
      SPARK_RPC_ENCRYPTION_ENABLED: "no"
      SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED: "no"
      SPARK_SSL_ENABLED: "no"
    ports:
      - "8085:8085"
    volumes:
      - ./infra/spark/jobs:/opt/spark-jobs:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -lc '</dev/tcp/127.0.0.1/8085'"]
      interval: 30s
      timeout: 10s
      retries: 5

  spark-worker:
    image: docker.io/bitnamilegacy/spark:3.5.1
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_MEMORY: 1G
      SPARK_WORKER_CORES: "2"
      SPARK_WORKER_WEBUI_PORT: "8081"
      SPARK_RPC_AUTHENTICATION_ENABLED: "no"
      SPARK_RPC_ENCRYPTION_ENABLED: "no"
      SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED: "no"
      SPARK_SSL_ENABLED: "no"
    ports:
      - "8086:8081"
    volumes:
      - ./infra/spark/jobs:/opt/spark-jobs:ro
    depends_on:
      spark-master:
        condition: service_healthy
    restart: unless-stopped

  airflow-init:
    <<: *airflow-common
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username airflow \
          --password airflow \
          --firstname Airflow \
          --lastname Admin \
          --role Admin \
          --email airflow@local.test || true

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      spark-master:
        condition: service_healthy
    restart: unless-stopped

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      spark-master:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres-data:
  minio-data:
  hadoop-namenode:
  hadoop-datanode:
